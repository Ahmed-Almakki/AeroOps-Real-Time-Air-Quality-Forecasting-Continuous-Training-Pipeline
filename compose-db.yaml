services:
  db:
    image: postgres:17.9
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - DB_data:/var/lib/postgresql/data

  adminer:
    image: adminer:standalone
    restart: always
    ports:
      - 8080:8080

volumes:
  DB_data: