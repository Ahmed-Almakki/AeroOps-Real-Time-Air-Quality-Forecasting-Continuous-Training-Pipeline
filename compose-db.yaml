services:
  db:
    image: postgres:17.9
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    
    ports:
      - "5433:5432"
    
    healthcheck:
      # Using $$ to reference the container's internal environment variables
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - DB_data:/var/lib/postgresql/data

  adminer:
    image: adminer:standalone
    restart: always
    ports:
      - 8081:8080

volumes:
  DB_data: