[tool.pylint."messages control"]
disable = [
    "line-too-long",
    "missing-module-docstring",
    "missing-function-docstring",
    "invalid-name",
    "broad-exception-caught",
    "ungrouped-imports"
]

[tool.black]
line-length = 100
target-version = ['py313']
skip-string-normalization = true

[tool.isort]
multi_line_output = 3
length_sort = true