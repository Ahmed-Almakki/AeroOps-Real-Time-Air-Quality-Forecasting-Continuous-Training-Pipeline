name: 'Air_Quality_System'

services:
  db:
    image: postgres:17.9
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - DB_data:/var/lib/postgresql/data
        
  mlflow_air:
    image: ghcr.io/mlflow/mlflow:latest
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "8080:5000"
    volumes:
      - mlflow_artifact_volume:/mlflow/artifacts
    depends_on:
      - db

    command: >
      mlflow server 
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      --default-artifact-root mlflow-artifacts:/
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000

  kafka:
    image: confluentinc/cp-kafka:8.1.3
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_MODE: "true" # manage its own meadata and cluster coordination, instead of using Zookeeper

      # kafka can have more than one node, all of them are brokers and one of them is the controller,
      # for simplicity we only use one node, it is both the broker and the controller
      CLUSTER_ID: "1L6g7nGnU-eAKfl--X25we" # generate a random UUID for the cluster ID
      KAFKA_NODE_ID: 1

      # this tell kafka how to communicate with the client and other nodes, since we only have one node, we can use PLAINTEXT for all of them
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'

      # this tell kafka the above node is both borker and controller, if we have more nodes, we can set different roles for them
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093 # this vote for who is controller since we only have one node, it votes for itself
      # but if we have more than one node we can do this only one node is controller if it crash the other will be the controller
      # KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_OFFSET_TOPIC_REPLICATION_FACTOR: 1 # this is for the internal topic that kafka use to store infomation metadata,
      # it keep track of the consumer which topic and partion it consume and so on
      # if this crash we lose all of the information SO IN PRODUCTION MAKE IT MORE THAN ONE

      # it open two doors one for the client to connect and one for the controller to communicate with other nodes
      # the other nodes will use the controller port to vote for the controller and communicate with the controller
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092'
      # this tell the client how to connect to kafka, the other url allow for other services in the docker network to connect to kafka also
      # instead of just localhost:9092 which is communicating with local script in your local machine
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER # this tell the other nodes how to connect to the controller
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT # this tell the other nodes how to connect to this node if they want to communicate with each other

      KAFKA_LOG_DIRS: /var/lib/kafka/data # this is where kafka store the data, if this crash we lose all of the data SO IN PRODUCTION MAKE IT MORE THAN ONE

    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  mlflow_artifact_volume:
  DB_data:
  kafka_data: