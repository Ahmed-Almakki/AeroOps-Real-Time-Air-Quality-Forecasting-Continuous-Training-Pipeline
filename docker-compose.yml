name: 'Air_Quality_System'

services:
  db:
    image: postgres:17.9
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ./DB_data:/var/lib/postgresql/data
      
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts  # this tell the mlflow server where to store the artifacts
    ports:
      - "8080:5000"
    volumes:
      - mlflow_artifact_volume:/mlflow/artifacts  # here why we use the enviromental variable above to tell teh container where to store the artifacts and 
                                                  # then we the "mlflow/artifacts" and mount it in our volume that already created
    depends_on:
      - db

    command: |
      mlflow server --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      --default-artifact-root /mlflow/artifacts --host

volumes:
  mlflow_artifact_volume: